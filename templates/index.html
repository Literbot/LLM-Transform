<!-- templates/chat.html -->
<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }}</title> <!-- 渲染傳遞過來的標題 -->
</head>
<body>
    <div><h1>{{ title }}</h1>  <!-- 顯示標題 --></div>
    
    <form id="convert-form">
        <label for="source-code">請輸入程式碼：<br></label>
        <textarea id="source-code" name="source-code" rows="4" cols="50"></textarea><br>

        <label for="source-lang">原始語言：<br></label>
        <select name="source-lang" id="source-lang"></select>
        <input type="text" id="source-lang" name="source-lang"><br>

        <label for="target-lang">目標語言：<br></label>
        <select name="target-lang" id="target-lang"></select>
        <input type="text" id="target-lang" name="target-lang"><br>

        <label for="model">選擇模型：<br></label>
        <select id="model" name="model">
            <option value="gpt-3">GPT-3</option>
            <option value="gpt-3.5-turbo">GPT-3.5 Turbo</option>
            <option value="gpt-4-turbo">GPT-4 Turbo</option>
            <option value="gpt-4">GPT-4</option>
        </select><br>

        <button type="submit">提交</button>
    </form>

    <div><h2>轉換後的程式碼：</h2></div>
    <pre id="converted-code"></pre>

    <script>
        document.getElementById('convert-form').addEventListener('submit', async (e) => {
            e.preventDefault();

            const model = document.getElementById('model').value;
            const sourceCode = document.getElementById('source-code').value;
            const sourceLang = document.getElementById('source-lang').value;
            const targetLang = document.getElementById('target-lang').value;

            const response = await fetch('http://127.0.0.1:5001/chat', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    model: model,
                    code: sourceCode,
                    source_lang: sourceLang,
                    target_lang: targetLang
                })
            });
            
            const data = await response.json();
            document.getElementById('converted-code').textContent = data.converted_code;
        });
    </script>
</body>
</html>
